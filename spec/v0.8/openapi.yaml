      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: './schemas/professional-identity-credentialled.schema.json'
                - $ref: './schemas/professional-identity-established.schema.json'
      responses:
        '201':
          description: Professional registered.

  /v1/professionals/me:
    get:
      tags: [Professional]
      operationId: getProfessionalSelf
      summary: Get own profile.
      security:
        - oauth2: [atah:professionals:self_read]
      responses:
        '200':
          description: Own profile.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './schemas/professional-identity-credentialled.schema.json'
                  - $ref: './schemas/professional-identity-established.schema.json'
    put:
      tags: [Professional]
      operationId: putProfessionalSelf
      summary: Update own profile (self-managed fields only).
      description: |
        Update self-managed fields on the professional's record. Self-managed
        fields include `looking_for_referral_partners` (Component 3 visibility
        toggle); changes to partner-managed fields (e.g. licence status) are
        rejected. Per F1.2, requires authenticated professional account or
        delegated professional-agent token; firm admin actions use
        `firm_delegation` with appropriate `object_constraints`.
      security:
        - oauth2: [atah:professionals:self_write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Partial profile update. Self-managed fields only. The
                `looking_for_referral_partners` toggle (Component 3) is
                included in this update path; v0.8.2 does not introduce a
                dedicated PATCH endpoint for the toggle.
              properties:
                looking_for_referral_partners:
                  type: boolean
                  description: Component 3 visibility toggle. Default false.
              additionalProperties: true
      responses:
        '200':
          description: Updated profile.

  /v1/professionals/me/verify-document:
    post:
      tags: [Professional]
      operationId: postProfessionalVerifyDocument
      summary: Submit a document for verification.
      security:
        - oauth2: [atah:professionals:self_write]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_type: { type: string }
                file: { type: string, format: binary }
              required: [document_type, file]
      responses:
        '202':
          description: Document submitted; review pending.

  /v1/professionals/me/mcp-connect:
    post:
      tags: [Professional]
      operationId: postProfessionalMcpConnect
      summary: Connect an MCP-capable AI assistant to the professional's profile.
      security:
        - oauth2: [atah:professionals:self_write]
      responses:
        '200':
          description: Connection established.

  /v1/professionals/me/withdraw:
    post:
      tags: [Professional]
      operationId: postProfessionalWithdraw
      summary: Professional withdrawal from matching — Component 2 withdrawal scenario 5.
      description: |
        The professional sets `matching_status: withdrawn` (or equivalent)
        and is removed from inclusion in Discovery. Per spec §11.9
        scenario 5: this is a **high-impact** action and MUST require
        step-up authentication at the point of action — re-authentication
        or enhanced authentication factor (re-auth via OAuth flow, second
        factor via TOTP, out-of-band push approval, or equivalent). The
        protocol mandates the requirement; the specific mechanism is an
        implementation choice in v0.8.2.

        The professional's record, required audit trail, dispute records,
        regulatory metadata, and existing Component 3 referral connections
        are **retained** per §11.8 / §11.9. Connection records are not
        automatically withdrawn — withdrawal-from-matching does not imply
        withdrawal-from-Component-3-connections; either can be performed
        independently.

        The audit event records `previous_state`, `resulting_state`
        (`withdrawn`), `reason_code`, the principal-delegation context,
        and an `auth_tier` value reflecting the step-up authentication
        applied.
      security:
        - oauth2: [atah:professionals:self_write]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason_code:
                  type: string
                  description: |
                    Reason code for the withdrawal. v0.8.2 ships with the
                    canonical values; the enumeration grows over time.
                step_up_token:
                  type: string
                  description: |
                    Token or proof that the step-up authentication was
                    completed at the point of action. The protocol requires
                    that step-up authentication happen; the specific token
                    shape is implementation-specific in v0.8.2.
              required: [reason_code, step_up_token]
              additionalProperties: false
      responses:
        '200':
          description: Withdrawal recorded; matching_status set to withdrawn.
          content:
            application/json:
              schema:
                type: object
                properties:
                  matching_status:
                    type: string
                    const: withdrawn
                  withdrawn_at:
                    type: string
                    format: date-time
                  audit_event_id:
                    type: string
                    minLength: 1
                required: [matching_status, withdrawn_at, audit_event_id]
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Step-up authentication not satisfied or `step_up_token` invalid.
          content:
            application/json:
              schema: { $ref: './schemas/error.schema.json' }
        '404': { $ref: '#/components/responses/NotFound' }

