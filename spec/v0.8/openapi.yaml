    get:
      tags: [Professional]
      operationId: getReferralConnections
      summary: Component 3 — list active referral connections.
      description: |
        Returns the active Component 3 referral connections involving the
        calling professional. Connection records are kept for de-duplication
        of `request_intent: 'referral_partner_search'` Discovery only; they
        are not used as a competence or trust signal anywhere in the
        protocol.
      security:
        - oauth2: [atah:professionals:self_read]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      responses:
        '200':
          description: Active connections.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: './schemas/referral-connection.schema.json' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/referral-connections/{connection_id}/withdraw:
    post:
      tags: [Professional]
      operationId: postReferralConnectionWithdraw
      summary: Component 3 — withdraw from a referral connection.
      description: |
        Either party withdraws from an active connection; the connection
        record is deleted. After withdrawal, the de-duplication exclusion
        no longer applies (either party may appear in the other's
        `request_intent: 'referral_partner_search'` Discovery results in
        future). Per F-4, governed by professional delegated authority.
      security:
        - oauth2: [atah:professionals:self_write]
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^conn-[A-Za-z0-9-]{6,64}$'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Connection withdrawn.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/referral-proposals/{proposal_id}/respond:
    post:
      tags: [Professional]
      operationId: postReferralProposalRespond
      summary: Component 3 — accept or decline an inbound proposal.
      description: |
        The target professional accepts or declines a pending Component 3
        proposal. On acceptance, ATAH creates a `referral-connection` record
        and deletes the proposal record. On decline, the proposal record is
        deleted. Per F-4, governed by professional delegated authority.
      security:
        - oauth2: [atah:professionals:self_write]
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^proposal-[A-Za-z0-9-]{6,64}$'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: string
                  enum: [accept, decline]
              required: [response]
              additionalProperties: false
      responses:
        '200':
          description: Response recorded.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/professionals/me/disputes:
