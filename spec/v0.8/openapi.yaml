# =================================================================
# components
# =================================================================
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: |
        OAuth 2.1. Client credentials for AI platforms, partners, and verifiers.
        Authorization code with PKCE for professional and admin user sessions.

        **Authority-basis to OAuth-scope mapping (per spec §4.9A and §7.3).**
        Each request carries an `authority_context.authority_basis` (declared
        in `principal-delegation.schema.json`) that establishes the credential
        class. The OAuth grant flow used to obtain the bearer token reflects
        the authority basis:

        - `user_session` → authorization code with PKCE (consumer-mediated
          flows; the AI platform is the authenticated_actor and holds the
          session token)
        - `professional_delegated_token` → authorization code with PKCE
          (professional account session) or a delegated-agent token issued
          to a professional's MCP-connected AI assistant
        - `firm_delegation` → authorization code with PKCE under a firm-admin
          delegation chain (firm admin authority over the professional)
        - `partner_credential` → client credentials (partners and verifiers)
        - `handoff_access_token` → tiered handoff-access per §11.5; presented
          alongside the OAuth bearer for stage-changing introduction calls
        - `governance_admin_role` → authorization code with PKCE (admin user
          session) with the `atah:admin` scope
        - `system_role` → internal; not exposed via OAuth flows

        Per F-16: `consumer` is not a valid `authenticated_actor.actor_type`;
        consumer-initiated calls authenticate as `ai_platform` and identify
        the consumer as `represented_principal_type: consumer` inside the
        principal/delegation context.
      flows:
        clientCredentials:
          tokenUrl: https://api.atahprotocol.org/v1/auth/token
          scopes:
            'atah:find': Query for professionals via /v1/query and find_professional.
            'atah:introductions:create': Initiate introductions.
            'atah:introductions:read': Read introduction status.
            'atah:introductions:write': Submit data, advance state, cancel, revoke on introductions.
            'atah:outcomes:write': Report introduction outcomes.
            'atah:professionals:self_read': Read own professional profile.
            'atah:professionals:self_write': Update own professional profile.
            'atah:partner:data.write': Push partner data.
            'atah:verifier:verification.write': Submit enhanced verification records.
            'atah:admin': Admin operations (governance/admin role only).
        authorizationCode:
          authorizationUrl: https://api.atahprotocol.org/v1/auth/authorize
          tokenUrl: https://api.atahprotocol.org/v1/auth/token
          scopes:
            'atah:professionals:self_read': Read own professional profile.
            'atah:professionals:self_write': Update own professional profile.
            'atah:admin': Admin operations (governance/admin role only).

  parameters:
    AcceptVersion:
      name: Accept-Version
      in: header
      required: false
      schema:
        type: string
        default: '0.8'
      description: Negotiate API version. Defaults to current major.minor.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: |
        Idempotency key for mutating operations. Server returns the original
        result for repeated keys within a 24-hour retention window. Replay
        with a different payload returns 409.
    IdempotencyKeyOptional:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: Optional on /v1/query (queries are read-like but stateful enough to support idempotency).
    HandoffId:
      name: handoff_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^hf-[A-Za-z0-9-]{6,64}$'
    HandoffAccessToken:
      name: X-Handoff-Access-Token
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: |
        Tiered handoff-access (spec §11.5). Required on every state-changing
        introduction call. handoff_id alone is NOT a bearer token.

  responses:
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: './schemas/error.schema.json' }
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema: { $ref: './schemas/error.schema.json' }
    Forbidden:
      description: Authenticated but not authorised for this resource.
      content:
        application/json:
          schema: { $ref: './schemas/error.schema.json' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: './schemas/error.schema.json' }
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema: { $ref: './schemas/error.schema.json' }
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema: { $ref: './schemas/error.schema.json' }

