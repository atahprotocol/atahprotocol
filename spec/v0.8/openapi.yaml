openapi: 3.1.0
info:
  title: ATAH — Agent to Authenticated Human Protocol
  version: 0.8.0
  description: |
    ATAH REST binding (v0.8). One of the v0.8 reference bindings; alternative or
    additional bindings may be defined in future. The protocol-level requirements
    that this binding exposes are defined in the Core Protocol and Registry
    Operation Profile schemas under `./schemas/` and in `spec/v0.8/full-spec.md`.

    This contract conforms to ATAH binding conformance (spec Section 14.2).

    **v0.8.0 status note:** External API, Auth, and discovery endpoints carry full
    operation definitions with examples. Professional, Partner, Independent
    Verifier, and Admin endpoints are documented at stub level — operation,
    scopes, and key body/response refs only. Per-endpoint examples for those four
    surfaces are scheduled for v0.8.1.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: ATAH Protocol
    url: https://atahprotocol.org
    email: hello@atahprotocol.org

servers:
  - url: https://api.atahprotocol.org
    description: Reference registry (operated by the ATAH project)

tags:
  - name: External
    description: Consumer- and AI-agent-facing endpoints (spec §7.4).
  - name: Professional
    description: Endpoints used by professionals operating their own profile (spec §7.5).
  - name: Partner
    description: Endpoints used by trusted partners pushing verified data (spec §7.6).
  - name: Verifier
    description: Endpoints used by approved independent verifiers (spec §7.7).
  - name: Admin
    description: Governance and admin operations (spec §7.8).
  - name: Auth
    description: OAuth 2.1 authentication endpoints.
  - name: Discovery
    description: Implementation discovery and capability endpoints.

security:
  - oauth2: []

paths:
  # ============================================================
  # External API
  # ============================================================
  /v1/query:
    post:
      tags: [External]
      operationId: postQuery
      summary: Discovery — find professionals (Component 1).
      description: |
        Component 1 (Discovery) — submit a query for candidate professionals.
        Returns a candidate set with full trusted partner data payload,
        `presentation_disclosure`, and `protocol_version`. AI platforms MUST
        surface `presentation_disclosure` to the end user.

        The required `request_intent` parameter (`self`,
        `on_behalf_of_client`, `referral_partner_search`) gates which
        next-step components are available:
        - `self` → Component 2 (Consumer-self handoff) is available.
        - `on_behalf_of_client` → Component 2 is NOT available; the
          professional handles the introduction off-protocol.
        - `referral_partner_search` → Component 3 (Referral connection-
          making) is available; the candidate set excludes professionals
          the requester is already connected to via an active
          `referral-connection`.

        The required `limit` parameter (1–100) replaces the v0.8.1
        `shortlist_size` field. Discovery returns a working candidate set,
        not an exhaustive directory; AI agents requesting larger sets
        should narrow `matter` filters.
      security:
        - oauth2: [atah:find]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/query.schema.json'
            examples:
              urgentPrCrisis:
                $ref: '#/components/examples/QueryExample'
      responses:
        '200':
          description: Ranked shortlist.
          content:
            application/json:
              schema:
                $ref: './schemas/match-response.schema.json'
              examples:
                singleResult:
                  $ref: '#/components/examples/MatchResponseExample'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /v1/professionals/{atah_id}:
    get:
      tags: [External]
      operationId: getProfessional
      summary: Get the public professional profile.
      description: |
        Returns the credentialled or established professional profile. The
        response shape is one of the two profile schemas; the discriminator is
        `professional_tier`.
      security:
        - oauth2: [atah:find]
      parameters:
        - name: atah_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^atah-[A-Za-z0-9-]{6,64}$'
        - $ref: '#/components/parameters/AcceptVersion'
      responses:
        '200':
          description: Professional profile.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './schemas/professional-identity-credentialled.schema.json'
                  - $ref: './schemas/professional-identity-established.schema.json'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410':
          description: Profile withdrawn or deceased; gone.
          content:
            application/json:
              schema: { $ref: './schemas/error.schema.json' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/introductions:
    post:
      tags: [External]
      operationId: postIntroduction
      summary: Initiate a new Component 2 (consumer-self) handoff.
      description: |
        Creates a Component 2 handoff record and returns a `handoff_id` plus a
        `handoff_access_token`. Subsequent state-changing calls MUST present the
        `handoff_access_token`. `handoff_id` alone is NOT a bearer token; the
        tiered handoff-access model is defined in spec §11.5.

        Available only when the originating Discovery query had
        `request_intent: 'self'`. Implementations MUST validate this
        precondition server-side using the principal-delegation context
        recorded against the query and reject calls otherwise.

        The required `flow_variant` parameter selects one of three Component 2
        flows:
        - `off_protocol` — records that ATAH was not invoked beyond Discovery.
        - `contact_share` — single-stage flow: consumer consents, contact
          details flow through the transient encrypted vault, professional
          retrieves through authenticated retrieval, vault crypto-erases on
          retrieval.
        - `full_lifecycle` — Stage 1 / Stage 2 / Stage 3 lifecycle.

        Returns 409 Conflict if the consumer already has an active
        introduction to this professional.
      security:
        - oauth2: [atah:introductions:create]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                introduction_type:
                  type: string
                  enum: [component_2_consumer_handoff]
                flow_variant:
                  type: string
                  enum: [off_protocol, contact_share, full_lifecycle]
                atah_id:
                  type: string
                  pattern: '^atah-[A-Za-z0-9-]{6,64}$'
                consent_receipt_id:
                  type: string
                  pattern: '^cr-[A-Za-z0-9-]{6,64}$'
                matter_type:
                  type: string
                location_or_jurisdiction:
                  type: string
                urgency:
                  type: string
                  enum: [routine, standard, urgent, emergency]
              required: [introduction_type, flow_variant, atah_id, consent_receipt_id]
              additionalProperties: false
      responses:
        '201':
          description: Handoff created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  handoff_id:
                    type: string
                    pattern: '^hf-[A-Za-z0-9-]{6,64}$'
                  handoff_access_token:
                    type: string
                  current_state:
                    type: string
                  protocol_version:
                    type: string
                    const: '0.8'
                  pre_handoff_check_required:
                    type: string
                    enum: [conflict_check, scope_confirmation, capacity_confirmation, fee_alignment, none]
                required: [handoff_id, handoff_access_token, current_state, protocol_version, pre_handoff_check_required]
                additionalProperties: false
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict — an active introduction to this professional already exists.
          content:
            application/json:
              schema: { $ref: './schemas/error.schema.json' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/introductions/{handoff_id}:
    get:
      tags: [External]
      operationId: getIntroduction
      summary: Get current introduction state.
      description: |
        Read access per spec §11.5. Available to the original asserter platform
        and to authenticated AI platforms presenting a `consumer_ref` matching
        the handoff record. Does NOT return personal data.
      security:
        - oauth2: [atah:introductions:read]
      parameters:
        - $ref: '#/components/parameters/HandoffId'
        - $ref: '#/components/parameters/AcceptVersion'
        - name: consumer_ref
          in: query
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Handoff record (Component 2).
          content:
            application/json:
              schema: { $ref: './schemas/handoff-component2.schema.json' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/introductions/{handoff_id}/stage-2:
    post:
      tags: [External]
      operationId: postIntroductionStage2
      summary: Submit Stage 2 pre-handoff check data.
      description: |
        Personal data lands in the transient encrypted vault (spec §11.6).
        It does NOT leave the vault via SMS or email; the professional retrieves
        it through authenticated retrieval.
      security:
        - oauth2: [atah:introductions:write]
      parameters:
        - $ref: '#/components/parameters/HandoffId'
        - $ref: '#/components/parameters/HandoffAccessToken'
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './schemas/stage2-prehandoff.schema.json' }
      responses:
        '200':
          description: |
            Stage 2 data accepted; vault reference returned. If the professional
            has a concurrent Stage 2 in flight, the response carries a
            `held_status` block indicating the submission is held until the
            prior submission resolves; the response still returns 200.
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_state: { type: string }
                  vault_reference:
                    type: string
                    pattern: '^vault-[A-Za-z0-9-]{6,64}$'
                  confirmation_id: { type: string }
                  held_status:
                    type: object
                    description: Present when the professional has a concurrent Stage 2 in flight. Submission is held until the prior submission resolves.
                    properties:
                      held_until: { type: string, format: date-time }
                      reason: { type: string, minLength: 1 }
                    required: [held_until, reason]
                    additionalProperties: false
                required: [current_state, vault_reference, confirmation_id]
                additionalProperties: false
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/introductions/{handoff_id}/stage-3:
    post:
      tags: [External]
      operationId: postIntroductionStage3
      summary: Submit Stage 3 contact release.
      description: |
        Releases consumer contact details to the selected professional via the
        transient encrypted vault. PII is NOT transmitted via SMS or email.
      security:
        - oauth2: [atah:introductions:write]
      parameters:
        - $ref: '#/components/parameters/HandoffId'
        - $ref: '#/components/parameters/HandoffAccessToken'
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './schemas/stage3-contact.schema.json' }
      responses:
        '200':
          description: Contact details released to vault; reference returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_state: { type: string }
                  vault_reference:
                    type: string
                    pattern: '^vault-[A-Za-z0-9-]{6,64}$'
                  confirmation_id: { type: string }
                required: [current_state, vault_reference, confirmation_id]
                additionalProperties: false
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/introductions/{handoff_id}/outcome:
    post:
      tags: [External]
      operationId: postIntroductionOutcome
      summary: Submit outcome report.
      description: |
        Reports the outcome of an introduction when it concludes. The
        `consumer-reported-concern` outcome routes to the concern flag mechanism
        (spec §5.10) — admin-only visibility, professional notified with right
        of reply. ATAH does not adjudicate.
      security:
        - oauth2: [atah:outcomes:write]
      parameters:
        - $ref: '#/components/parameters/HandoffId'
        - $ref: '#/components/parameters/HandoffAccessToken'
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome_code:
                  type: string
                  enum:
                    - introduction-successful
                    - professional-declined-conflict
                    - professional-declined-scope
                    - professional-declined-capacity
                    - professional-declined-fee
                    - professional-declined-other
                    - consumer-chose-alternative
                    - matter-not-proceeding
                    - no-response-from-consumer
                    - consumer-reported-concern
                    - consumer-cancelled
                    - consent-revoked
                outcome_notes:
                  type: string
              required: [outcome_code]
              additionalProperties: false
      responses:
        '200':
          description: Outcome recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_state: { type: string }
                  confirmation_id: { type: string }
                  concern_flag_id:
                    type: string
                    pattern: '^flag-[A-Za-z0-9-]{6,64}$'
                required: [current_state, confirmation_id]
                additionalProperties: false
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/introductions/{handoff_id}/cancel:
    post:
      tags: [External]
      operationId: postIntroductionCancel
      summary: Consumer cancellation — Component 2 withdrawal scenarios 1 / 2.
      description: |
        Consumer-side cancellation of a Component 2 handoff. Per spec §11.9:

        - **Scenario 1 — Consumer withdrawal before data sharing.** Stops
          the handoff before any vault data has been shared. The handoff's
          `withdrawal_state` becomes `consumer_withdrew_pre_share`;
          `current_state` advances to `consumer-cancelled`.
        - **Scenario 2 — Consumer withdrawal after Stage 2 viewed.** Stops
          future processing; ATAH cannot retract Stage 2 data the
          professional has already retrieved (vault payload typically
          already crypto-erased per §11.6). `withdrawal_state` becomes
          `consumer_withdrew_post_stage2`.

        The audit event for the cancellation records `previous_state`,
        `resulting_state`, `reason_code`, and the principal-delegation
        context per §11.9. Vault payload (where present) is crypto-erased
        synchronously.
      security:
        - oauth2: [atah:introductions:write]
      parameters:
        - $ref: '#/components/parameters/HandoffId'
        - $ref: '#/components/parameters/HandoffAccessToken'
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cancellation_reason: { type: string }
              additionalProperties: false
      responses:
        '200':
          description: Introduction cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_state:
                    type: string
                    const: consumer-cancelled
                  confirmation_id: { type: string }
                  vault_data_deleted_at:
                    type: string
                    format: date-time
                required: [current_state, confirmation_id]
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/introductions/{handoff_id}/revoke-consent:
    post:
      tags: [External]
      operationId: postIntroductionRevokeConsent
      summary: Consumer revocation of consent — Component 2 withdrawal scenario 3.
      description: |
        Consumer-side revocation of a consent receipt referenced by the
        handoff. Per spec §11.9 scenario 3 — Consumer withdrawal after
        Stage 3 retrieval — any remaining vault payload is crypto-erased
        immediately and ATAH processing stops. ATAH cannot force deletion
        from the professional's systems; that obligation rests with the
        professional under their own privacy framework.

        The handoff's `withdrawal_state` becomes
        `consumer_withdrew_post_stage3_retrieval`. The audit event records
        `previous_state`, `resulting_state`, `reason_code`, the consent
        receipt's `revocation_status` flip, and the principal-delegation
        context per §11.9. Audit metadata, consent-receipt integrity
        metadata, and state history are retained per §11.8.
      security:
        - oauth2: [atah:introductions:write]
      parameters:
        - $ref: '#/components/parameters/HandoffId'
        - $ref: '#/components/parameters/HandoffAccessToken'
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consent_receipt_id:
                  type: string
                  pattern: '^cr-[A-Za-z0-9-]{6,64}$'
              required: [consent_receipt_id]
              additionalProperties: false
      responses:
        '200':
          description: Consent revoked; vault data deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  consent_receipt_id:
                    type: string
                    pattern: '^cr-[A-Za-z0-9-]{6,64}$'
                  revocation_status:
                    type: string
                    enum: [active, revoked, expired]
                  vault_data_deleted_at:
                    type: string
                    format: date-time
                  confirmation_id: { type: string }
                required: [consent_receipt_id, revocation_status, confirmation_id]
                additionalProperties: false

  /v1/consent-receipts:
    post:
      tags: [External]
      operationId: postConsentReceipt
      summary: Submit a consent receipt — Phase 4 (Option B) submission endpoint.
      description: |
        The asserting AI platform submits a captured consent receipt. ATAH
        validates the receipt, computes a SHA-256 hash, computes the F-3
        continuity-binding metadata (`client_id`, `pseudonymous_consumer_ref`
        HMAC, `data_categories_hash` for `disclosure_consent`), stores the
        hash and metadata, and returns a `consent_receipt_id`. Subsequent
        consenting endpoints reference the receipt by `consent_receipt_id`
        only — the full receipt body is never re-submitted.

        The receipt's `asserted_by.client_application.platform_id` MUST
        match the authenticated platform; mismatch returns 403.

        Per spec §4.10: the `consent_type` enum is restricted to
        `query_authorization` and `disclosure_consent`. Engagement consent
        is excluded by design and is not a valid value. ATAH consent
        receipts MUST NOT be represented as professional engagement
        consent.

        Per F-4 (codified in §6.4 and §7.3): Component 3 referral-
        connection actions are governed by professional delegated
        authority and MUST NOT use consent receipts; this endpoint accepts
        only `consent_type: query_authorization` and `consent_type:
        disclosure_consent`.

        Idempotency: required. Replay with the same Idempotency-Key
        returns the original `consent_receipt_id`.
      security:
        - oauth2: [atah:introductions:create, atah:introductions:write]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './schemas/consent-receipt.schema.json' }
      responses:
        '201':
          description: Consent receipt submitted; `consent_receipt_id` issued.
          content:
            application/json:
              schema: { $ref: './schemas/consent-receipt-stored.schema.json' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Asserting platform mismatch or unsupported `consent_type`.
          content:
            application/json:
              schema: { $ref: './schemas/error.schema.json' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/consent-receipts/{consent_receipt_id}/revoke:
    post:
      tags: [External]
      operationId: postConsentReceiptRevoke
      summary: Revoke a previously-submitted consent receipt (non-handoff-bound).
      description: |
        Symmetric counterpart to `POST /v1/consent-receipts`. Flips the
        receipt's `revocation_status` to `revoked` for receipts that are
        not bound to a handoff (`query_authorization` scope; or
        pre-handoff `disclosure_consent` receipts not yet consumed).
        Receipts already bound to a handoff use the handoff-scoped
        revocation endpoint (`POST
        /v1/introductions/{handoff_id}/revoke-consent`) so vault payload
        crypto-erasure is performed in the same call.

        Idempotent: revoking an already-revoked receipt returns 200 with
        `revocation_status: revoked` unchanged. Audit metadata for the
        original assertion and the revocation are retained per §11.8.
      security:
        - oauth2: [atah:introductions:write]
      parameters:
        - name: consent_receipt_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^cr-[A-Za-z0-9-]{6,64}$'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Receipt revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  consent_receipt_id:
                    type: string
                    pattern: '^cr-[A-Za-z0-9-]{6,64}$'
                  revocation_status:
                    type: string
                    enum: [active, revoked, expired]
                  revoked_at:
                    type: string
                    format: date-time
                  confirmation_id: { type: string }
                required: [consent_receipt_id, revocation_status, confirmation_id]
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/referral-proposals:
    post:
      tags: [Professional]
      operationId: postReferralProposal
      summary: Component 3 — propose a referral connection.
      description: |
        Component 3 (Referral connection-making) — proposing professional A
        asks ATAH to record a pending proposal targeting professional B.
        Per F-4, this endpoint is governed by professional delegated
        authority recorded in the request's principal-delegation context;
        it does NOT accept `consent_receipt_id`. The target professional
        must have `looking_for_referral_partners: true` at the time of
        proposal creation.
      security:
        - oauth2: [atah:introductions:create]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './schemas/referral-proposal.schema.json' }
      responses:
        '201':
          description: Proposal created.
          content:
            application/json:
              schema: { $ref: './schemas/referral-proposal.schema.json' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Target professional not found, or `looking_for_referral_partners` is false.
          content:
            application/json:
              schema: { $ref: './schemas/error.schema.json' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/referral-proposals/inbound:
    get:
      tags: [Professional]
      operationId: getInboundReferralProposals
      summary: Component 3 — list inbound referral proposals.
      description: |
        Returns the pending Component 3 proposals targeting the calling
        professional. Per F-4, governed by professional delegated authority.
      security:
        - oauth2: [atah:professionals:self_read]
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      responses:
        '200':
          description: Inbound proposals.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: './schemas/referral-proposal.schema.json' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/referral-proposals/outbound:
    get:
      tags: [Professional]
      operationId: getOutboundReferralProposals
      summary: Component 3 — list outbound referral proposals.
      description: |
        Returns the pending Component 3 proposals the calling professional
        has sent. Per F-4, governed by professional delegated authority.
      security:
        - oauth2: [atah:professionals:self_read]
      parameters:
