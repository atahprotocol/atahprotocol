    get:
      tags: [Professional]
      operationId: getReferralProposal
      summary: Component 3 — get proposal status.
      security:
        - oauth2: [atah:professionals:self_read]
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^proposal-[A-Za-z0-9-]{6,64}$'
        - $ref: '#/components/parameters/AcceptVersion'
      responses:
        '200':
          description: Proposal record.
          content:
            application/json:
              schema: { $ref: './schemas/referral-proposal.schema.json' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/referral-proposals/{proposal_id}/withdraw:
    post:
      tags: [Professional]
      operationId: postReferralProposalWithdraw
      summary: Component 3 — withdraw an outbound proposal.
      description: |
        The proposing professional withdraws a pending proposal before the
        target has responded. The proposal record is deleted; the audit
        event records the withdrawal with `resolved_at`. Per F-4, governed
        by professional delegated authority.
      security:
        - oauth2: [atah:professionals:self_write]
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^proposal-[A-Za-z0-9-]{6,64}$'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Proposal withdrawn.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

